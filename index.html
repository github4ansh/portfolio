<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ansh Agarwal — Senior Software Engineer building cloud-native, data-driven solutions with AI at the helm. Portfolio showcasing 5+ years of full-stack, cloud, and AI engineering." />
  <meta name="author" content="Ansh Agarwal" />

  <!-- Open Graph -->
  <meta property="og:title" content="Ansh Agarwal | Senior Software Engineer" />
  <meta property="og:description" content="Tech-Agnostic Senior Software Engineer — Full-Stack, Cloud-Native, AI & Data Science." />
  <meta property="og:type" content="website" />

  <!-- Fonts: Inter + JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
  <title>Ansh Agarwal | Senior Software Engineer</title>
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════
       Navigation — built dynamically by script.js from CONFIG.navLinks
       ═══════════════════════════════════════════════════════════════════ -->
  <nav id="main-nav" role="navigation" aria-label="Main navigation"></nav>

  <!-- ═══════════════════════════════════════════════════════════════════
       Hero — animated greeting, typed title, CTA buttons, particles
       ═══════════════════════════════════════════════════════════════════ -->
  <section id="hero" role="banner" aria-label="Hero"></section>

  <!-- ═══════════════════════════════════════════════════════════════════
       About — story-driven bio, highlights, education, awards
       ═══════════════════════════════════════════════════════════════════ -->
  <section id="about" aria-label="About me"></section>

  <!-- ═══════════════════════════════════════════════════════════════════
       Skills — visual tech groupings with pill tags
       ═══════════════════════════════════════════════════════════════════ -->
  <section id="skills" aria-label="Skills and technologies"></section>

  <!-- ═══════════════════════════════════════════════════════════════════
       Experience — alternating timeline cards
       ═══════════════════════════════════════════════════════════════════ -->
  <section id="experience" aria-label="Work experience"></section>

  <!-- ═══════════════════════════════════════════════════════════════════
       Projects — card grid with featured badges and tags
       ═══════════════════════════════════════════════════════════════════ -->
  <section id="projects" aria-label="Projects"></section>

  <!-- ═══════════════════════════════════════════════════════════════════
       Blog — blog cards linked to Bear blog
       ═══════════════════════════════════════════════════════════════════ -->
  <section id="blog" aria-label="Blog and writing"></section>

  <!-- ═══════════════════════════════════════════════════════════════════
       Contact — form + social links
       ═══════════════════════════════════════════════════════════════════ -->
  <section id="contact" aria-label="Contact"></section>

  <!-- ═══════════════════════════════════════════════════════════════════
       Footer
       ═══════════════════════════════════════════════════════════════════ -->
  <footer id="main-footer" role="contentinfo"></footer>

  <!-- All content is rendered by script.js from the CONFIG object -->
  <script src="script.js"></script>
</body>
</html>
